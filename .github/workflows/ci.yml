name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run --filter '@totus/web' lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck all packages
        run: bun run --filter '*' typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: totus
          POSTGRES_PASSWORD: totus
          POSTGRES_DB: totus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U totus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://totus:totus@localhost:5432/totus
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      MOCK_AUTH_SECRET: ci-mock-auth-secret
      VIEWER_JWT_SECRET: ci-viewer-jwt-secret
      VIEWER_JWT_SECRET_PREVIOUS: ci-viewer-jwt-secret-previous
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push database schema
        run: cd apps/web && bunx drizzle-kit push

      - name: Run tests
        run: bun run --filter '*' test

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run --filter '*' build
