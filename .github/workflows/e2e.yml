name: E2E Tests

# Triggered when Vercel finishes deploying a preview.
# The Vercel GitHub integration sends a deployment_status event automatically.
on:
  deployment_status:

jobs:
  e2e:
    name: Playwright E2E
    # Only run on successful preview deployments
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview – totus-web'
    timeout-minutes: 15
    runs-on: ubuntu-latest

    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Wait for preview to be ready
        run: |
          echo "Waiting for $PLAYWRIGHT_BASE_URL to respond..."
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" "$PLAYWRIGHT_BASE_URL"; then
              echo "Preview is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, waiting 5s..."
            sleep 5
          done
          echo "Preview did not become ready in time"
          exit 1

      - name: Run Playwright tests
        run: cd apps/web && npx playwright test
        env:
          # Preview deployments use mock auth
          NEXT_PUBLIC_USE_MOCK_AUTH: "true"

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/blob-report/
          retention-days: 7

      - name: Upload test results (traces, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/web/test-results/
          retention-days: 7
